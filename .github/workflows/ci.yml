name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run smoke tests
        run: npm test

      - name: Verify server boots
        run: |
          node server/index.js &
          SERVER_PID=$!
          sleep 2
          curl -fsS http://localhost:3000/api/health
          curl -fsS "http://localhost:3000/api/visas?location=onshore" > /dev/null
          curl -fsS http://localhost:3000/ | grep -q "AusWise Migration"
          kill $SERVER_PID

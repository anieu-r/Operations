# One-click deploy to Render (https://render.com) — Infrastructure as Code.
# In Render: New + → Blueprint → connect this repo. Or deploy the Dockerfile
# directly as a Web Service. The app binds to $PORT automatically.
services:
  - type: web
    name: auswise-migration
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Optional — set these to enable LIVE VEVO checks (org enrolment required).
      - key: VEVO_ACCESS_TOKEN
        sync: false
      - key: VEVO_CLIENT_ID
        sync: false
      # Optional — set to enable Stripe service payments (sk_test_… or sk_live_…).
      - key: STRIPE_SECRET_KEY
        sync: false
      # Optional — SMTP for email notifications (e.g. Gmail App Password).
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: NOTIFY_EMAIL
        sync: false
